- nom_slow_1p35V_125C
- nom_typ_1p50V_25C

# Floorplanning
FP_SIZING: absolute
DIE_AREA: [0, 0, 3000, 3000]
CORE_AREA: [365, 365, "expr::$DIE_AREA[2] - 365", "expr::$DIE_AREA[3] - 365"]
PL_TARGET_DENSITY_PCT: 50

# Power Distribution Network
PDN_CFG: dir::pdn_cfg.tcl
PDN_CORE_RING: True

# Maximum metal width without slotting: 30um
PDN_CORE_RING_VWIDTH: 15
PDN_CORE_RING_HWIDTH: 15
# Ensure minimum spacing for long metals
PDN_CORE_RING_VSPACING: 5
PDN_CORE_RING_HSPACING: 5

PDN_CORE_RING_CONNECT_TO_PADS: True
PDN_ENABLE_PINS: False

# Horizontal
PDN_HWIDTH: 4
PDN_HSPACING: 2
PDN_HPITCH: 60

# Vertical
PDN_HWIDTH: 4
PDN_HSPACING: 2
PDN_HPITCH: 60

NON_DEFAULT_RULES:
  # 3 times the width and spacing
  NDR_3W_3S:
    width: ["*3"]
    spacing: ["*3"]

  # 0.4um traces with dual-cut vias
  NDR_0p4:
    width: ["0.4"]
    spacing: ["0.2"]
    via: ["Via1_DC1B", "Via2_DC1B", "Via3_DC1B", "TopVia1EWNS"]

  NDR_pudding_in:
    width: ["0.5"]
    spacing: ["0.2"]
    via: ["Via1_DC1B", "Via2_DC1B", "Via3_DC1B", "TopVia1EWNS"]

  NDR_pudding_out:
    width: ["0.7"]
    spacing: ["0.2"]
    via: ["Via1_DC1B", "Via2_DC1B", "Via3_DC1B", "TopVia1EWNS"]

DRT_ASSIGN_NDR:
  # Analog traces for internal project
  "^internal_analog_pin0_PADRES$": NDR_0p4
  "^internal_analog_pin1_PADRES$": NDR_0p4
  "^internal_analog_pin2_PADRES$": NDR_0p4
  "^pudding_i_in_PADRES$": NDR_pudding_in
  "^pudding_i_out_PADBARE$": NDR_pudding_out
  "^ethernet_dp_PADBARE$": NDR_0p4
  "^ethernet_dn_PADBARE$": NDR_0p4

RSZ_DONT_TOUCH_LIST:
  # Analog traces for internal project
- "internal_analog_pin0_PADRES"
- "internal_analog_pin1_PADRES"
- "internal_analog_pin2_PADRES"
- "pudding_i_in_PADRES"
- "pudding_i_out_PADBARE"
- "ethernet_dp_PADBARE"
- "ethernet_dn_PADBARE"

CTS_APPLY_NDR: none #full

ERROR_ON_PDN_VIOLATIONS: false

# Override bondpad name
