PNR_SDC_FILE: dir::chip_top.sdc
SIGNOFF_SDC_FILE: dir::chip_top.sdc
FALLBACK_SDC: dir::chip_top.sdc

VDD_NETS:
- VDD
GND_NETS:
- VSS

GRT_ALLOW_CONGESTION: true

# Clock
CLOCK_PORT: fpga_clk_PAD
CLOCK_NET: fpga_clk/p2c
CLOCK_PERIOD: 100
FP_SIZING: absolute
DIE_AREA: [0, 0, 3000, 3000]
CORE_AREA: [365, 365, "expr::$DIE_AREA[2] - 365", "expr::$DIE_AREA[3] - 365"]
PL_TARGET_DENSITY_PCT: 50

# Power Distribution Network
PDN_CFG: dir::pdn_cfg.tcl
PDN_CORE_RING: True

# Maximum metal width without slotting: 30um
PDN_CORE_RING_VWIDTH: 15
PDN_CORE_RING_HWIDTH: 15
# Ensure minimum spacing for long metals
PDN_CORE_RING_VSPACING: 5
PDN_CORE_RING_HSPACING: 5

PDN_CORE_RING_CONNECT_TO_PADS: True
PDN_ENABLE_PINS: False


NON_DEFAULT_RULES:
  # 3 times the width and spacing
  NDR_3W_3S:
    width: ["*3"]
    spacing: ["*3"]

  # 0.4um traces with dual-cut vias
  NDR_0p4:
    width: ["0.4"]
    spacing: ["0.2"]
    via: ["Via1_DC1B", "Via2_DC1B", "Via3_DC1B", "Via4_DC1B", "TopVia1EWNS", "TopVia2EWNS"]

DRT_ASSIGN_NDR:
  # Analog traces for internal project
  "^internal_analog_pin0_PADRES$": NDR_0p4
  "^internal_analog_pin1_PADRES$": NDR_0p4
  "^internal_analog_adc_PADRES$": NDR_0p4

PAD_LEFS: dir::../sg13g2_io.lef

CTS_APPLY_NDR: none #full

ERROR_ON_PDN_VIOLATIONS: false

# Override bondpad name
PAD_BONDPAD_NAME: bondpad_70x70_novias

# Bondpad is not yet included in the PDK
EXTRA_GDS:
- dir::../ip/bondpad_70x70/gds/bondpad_70x70.gds
- dir::../ip/bondpad_70x70_novias/gds/bondpad_70x70_novias.gds

EXTRA_LEFS:
- dir::../ip/bondpad_70x70/lef/bondpad_70x70.lef
- dir::../ip/bondpad_70x70_novias/lef/bondpad_70x70_novias.lef

IGNORE_DISCONNECTED_MODULES:
- bondpad_70x70
- bondpad_70x70_novias
- alignment_mark
- logo_heichips
- logo_fabulous
- logo_credits

# Because we have mutiple power
# pads for one power domain
MAGIC_EXT_UNIQUE: notopports

